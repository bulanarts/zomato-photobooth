<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zomato Photobooth</title>
  <link rel="stylesheet" href="Stylesheets/landing.css"/>
  <link rel="icon" href="Assets/favicon-tomato.png" type="image/x-icon"/>
</head>
<body>
  <div class="blip">
    <img src="Assets/blip.png" alt="coba sekarang">
  </div>
  <div class="photo">
    <img src="Assets/p1.jpg" id="foto1" alt="">
    <img src="Assets/p2.jpg" id="foto2" alt="">
    <img src="Assets/p3.jpg" id="foto3" alt="">
    <img src="Assets/p4.jpg" id="foto4" alt="">
  </div>
  <h1 class="floating-title">
  <span style="--i:0">Z</span>
  <span style="--i:1">O</span>
  <span style="--i:2">M</span>
  <span style="--i:3">A</span>
  <span style="--i:3">T</span>
  <span style="--i:4">O</span>
</h1>
  <h2 class="floating2-title uppercase">
  <span style="--i:0">p</span>
  <span style="--i:1">h</span>
  <span style="--i:2">o</span>
  <span style="--i:3">t</span>
  <span style="--i:3">o</span>
  <span style="--i:4">b</span>
  <span style="--i:3">o</span>
  <span style="--i:3">o</span>
  <span style="--i:3">t</span>
  <span style="--i:1">h</span>
</h2>
  <div class="button-container">
    <button id="select-button">Let's Go!</button>
  </div>
  <script src="Javascript/landing.js"></script>
</body>
</html>
