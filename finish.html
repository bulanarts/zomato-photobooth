<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tadaaa.. finish</title>
    <link rel="stylesheet" href="Stylesheets/finish.css"/>
    <link rel="icon" href="Assets/favicon-tomato.png" type="image/x-icon"/>
</head>
<body>
    <div class="heading-content">
        <div class="menu-header" style="display:none"></div>
        <div class="sticker-container">
            <h1>Add Stickers!</h1>
            <p>(click then drag)</p>
            <div class="stickers-btns">

                <button id="addStar2" class="sticker-btn star2-btn">Add Star</button>
                <button id="addStar3" class="sticker-btn star3-btn">Add Star</button>

                <button id="addTomato" class="sticker-btn tomato-btn">Add Tomato</button>
                <button id="reset" class="sticker-btn reset-btn">Reset</button>

            </div>
        </div>
    </div>
    <div class="photobooth-container">
        <div id="canvasContainer">
        <canvas id="finalCanvas" width="1176" height="1478"></canvas>

    </div>
    <div class="buttonContainer">
        <button id="downloadBtn">Download</button>
